<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yet Another Tron</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #202020;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 12px;
      user-select: none;
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 4px;
      color: #fff;
      text-transform: uppercase;
      font-weight: 300;
    }

    #hud {
      display: flex;
      gap: 24px;
      font-size: 0.85rem;
      color: #aaa;
    }

    #hud span { color: #fff; font-weight: 600; }

    #canvas-wrapper {
      position: relative;
      border: 1px solid #444;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      gap: 16px;
    }

    #overlay h2 { font-size: 1.3rem; font-weight: 400; letter-spacing: 2px; }
    #overlay p  { color: #aaa; font-size: 0.85rem; }

    #controls {
      font-size: 0.78rem;
      color: #666;
      text-align: center;
      line-height: 1.9;
    }

    /* Mobile D-Pad */
    #dpad {
      display: none;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 4px;
    }

    .dpad-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .dpad-btn:active { background: rgba(255,255,255,0.2); }
    .dpad-center { visibility: hidden; }

    @media (max-width: 700px) or (pointer: coarse) {
      #dpad { display: grid; }
      #controls { display: none; }
    }

    #status {
      font-size: 0.78rem;
      color: #555;
    }
    #status.connected { color: #2a9; }
    #status.disconnected { color: #c44; }
  </style>
</head>
<body>

<h1>⟨ Tron ⟩</h1>

<div id="hud">
  <div>Joueurs en ligne : <span id="player-count">0</span></div>
  <div id="status" class="disconnected">● Déconnecté</div>
</div>

<div id="canvas-wrapper">
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <h2>Yet Another Tron</h2>
    <p>Connexion au serveur...</p>
  </div>
</div>

<div id="dpad">
  <div></div>
  <button class="dpad-btn" id="btn-up">▲</button>
  <div></div>
  <button class="dpad-btn" id="btn-left">◀</button>
  <div class="dpad-center"></div>
  <button class="dpad-btn" id="btn-right">▶</button>
  <div></div>
  <button class="dpad-btn" id="btn-down">▼</button>
  <div></div>
</div>

<div id="controls">
  ZQSD ou ← ↑ ↓ → pour diriger · Ne touche pas ta propre traîne !
</div>

<script>
// ─── Config ───────────────────────────────────────────────
const SQUARE = 8;   // px par cellule (sera calculé selon écran)
const COLORS = [
  "#F40404","#0C48CC","#2CB494","#88409C",
  "#F88C14","#C04028","#CCE0D0","#FCFC38",
  "#088008","#FCFC7C","#ECC4B0","#4068D4",
];

// ─── State ────────────────────────────────────────────────
let socket = null;
let myId = 0;
let mapWidth = 100;
let mapHeight = 60;
let cellSize = SQUARE;
let lastDir = -1;
let reconnectTimer = null;
let isConnected = false;

// Canvas 2D
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const statusEl = document.getElementById("status");
const playerCountEl = document.getElementById("player-count");

// Map locale : tableau [x][y] = id joueur (0 = vide)
let localMap = [];

function initMap(w, h) {
  mapWidth = w;
  mapHeight = h;
  localMap = Array.from({ length: w }, () => new Array(h).fill(0));
  resizeCanvas();
}

function resizeCanvas() {
  // Adapte la taille du canvas à l'écran
  const maxW = Math.min(window.innerWidth - 32, 900);
  const maxH = Math.min(window.innerHeight - 200, 600);
  cellSize = Math.max(4, Math.floor(Math.min(maxW / mapWidth, maxH / mapHeight)));
  canvas.width  = mapWidth  * cellSize;
  canvas.height = mapHeight * cellSize;
  redrawFull();
}

window.addEventListener("resize", resizeCanvas);

// ─── Dessin ───────────────────────────────────────────────
function colorForId(id) {
  return COLORS[(id - 1) % COLORS.length];
}

function drawCell(x, y, id) {
  if (x < 0 || y < 0 || x >= mapWidth || y >= mapHeight) return;
  if (id === 0) {
    ctx.fillStyle = "#202020";
  } else {
    ctx.fillStyle = colorForId(id);
    // Légère brillance pour "ma" couleur
    if (id === myId) ctx.fillStyle = brighten(colorForId(id));
  }
  const px = x * cellSize;
  const py = y * cellSize;
  ctx.fillRect(px, py, cellSize, cellSize);
  // Petite bordure sombre pour lisibilité
  if (id !== 0 && cellSize >= 6) {
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(px, py, cellSize, 1);
    ctx.fillRect(px, py, 1, cellSize);
  }
}

function brighten(hex) {
  // Rend la couleur un peu plus vive pour le joueur local
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)})`;
}

function redrawFull() {
  ctx.fillStyle = "#202020";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let x = 0; x < mapWidth; x++) {
    for (let y = 0; y < mapHeight; y++) {
      if (localMap[x] && localMap[x][y] !== 0) {
        drawCell(x, y, localMap[x][y]);
      }
    }
  }
}

// ─── WebSocket ────────────────────────────────────────────
function wsUrl() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  return `${proto}://${location.host}`;
}

function connect() {
  if (socket && socket.readyState < 2) return;
  try { socket = new WebSocket(wsUrl()); } catch(e) { scheduleReconnect(); return; }

  setOverlay("Connexion...", "");

  socket.onopen = () => {
    isConnected = true;
    clearTimeout(reconnectTimer);
    statusEl.textContent = "● Connecté";
    statusEl.className = "connected";
  };

  socket.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    handleMessage(msg);
  };

  socket.onclose = socket.onerror = () => {
    isConnected = false;
    statusEl.textContent = "● Déconnecté";
    statusEl.className = "disconnected";
    setOverlay("Déconnecté", "Reconnexion...");
    scheduleReconnect();
  };
}

function scheduleReconnect() {
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(connect, 2000);
}

function sendDir(d) {
  if (!isConnected || d === lastDir) return;
  const opposites = {0:1,1:0,2:3,3:2};
  if (d === opposites[lastDir]) return;
  lastDir = d;
  socket.send(JSON.stringify({ direction: d }));
}

// ─── Messages serveur ─────────────────────────────────────
function handleMessage(msg) {
  switch (msg.type) {

    case "map": {
      initMap(msg.mapWidth || 100, msg.mapHeight || 60);
      for (let x = 0; x < mapWidth; x++)
        for (let y = 0; y < mapHeight; y++)
          if (msg.map[x] && msg.map[x][y]) {
            localMap[x][y] = msg.map[x][y];
            drawCell(x, y, msg.map[x][y]);
          }
      break;
    }

    case "move": {
      if (!localMap[msg.x]) break;
      localMap[msg.x][msg.y] = msg.id;
      drawCell(msg.x, msg.y, msg.id);
      break;
    }

    case "clear": {
      for (let x = 0; x < mapWidth; x++)
        for (let y = 0; y < mapHeight; y++)
          if (localMap[x] && localMap[x][y] === msg.id) {
            localMap[x][y] = 0;
            drawCell(x, y, 0);
          }
      break;
    }

    case "spawn": {
      initMap(msg.mapWidth || mapWidth, msg.mapHeight || mapHeight);
      if (myId !== 0) flashDeath();
      myId = msg.id;
      lastDir = -1;
      hideOverlay();
      break;
    }

    case "players": {
      playerCountEl.textContent = msg.count;
      break;
    }
  }
}

// ─── UI helpers ───────────────────────────────────────────
function setOverlay(title, subtitle) {
  overlay.innerHTML = `<h2>${title}</h2><p>${subtitle}</p>`;
  overlay.style.display = "flex";
}

function hideOverlay() {
  overlay.style.display = "none";
}

function flashDeath() {
  canvas.style.transition = "opacity 0.1s";
  canvas.style.opacity = "0.3";
  setTimeout(() => {
    canvas.style.opacity = "1";
  }, 200);
}

// ─── Inputs clavier ───────────────────────────────────────
// 0=haut 1=bas 2=gauche 3=droite
const keyMap = {
  ArrowUp: 0, KeyW: 0, KeyZ: 0,
  ArrowDown: 1, KeyS: 1,
  ArrowLeft: 2, KeyA: 2, KeyQ: 2,
  ArrowRight: 3, KeyD: 3,
};

document.addEventListener("keydown", (e) => {
  if (e.code in keyMap) {
    e.preventDefault();
    sendDir(keyMap[e.code]);
  }
});

// ─── D-Pad mobile ─────────────────────────────────────────
document.getElementById("btn-up").addEventListener("touchstart",    e => { e.preventDefault(); sendDir(0); }, { passive: false });
document.getElementById("btn-down").addEventListener("touchstart",  e => { e.preventDefault(); sendDir(1); }, { passive: false });
document.getElementById("btn-left").addEventListener("touchstart",  e => { e.preventDefault(); sendDir(2); }, { passive: false });
document.getElementById("btn-right").addEventListener("touchstart", e => { e.preventDefault(); sendDir(3); }, { passive: false });
document.getElementById("btn-up").addEventListener("click",    () => sendDir(0));
document.getElementById("btn-down").addEventListener("click",  () => sendDir(1));
document.getElementById("btn-left").addEventListener("click",  () => sendDir(2));
document.getElementById("btn-right").addEventListener("click", () => sendDir(3));

// ─── Init ─────────────────────────────────────────────────
initMap(100, 60);
connect();
</script>
</body>
</html>
